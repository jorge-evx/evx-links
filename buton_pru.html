<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de prueba de botones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #mensaje {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="contenedor">
		<button data-mensaje="Mensaje del botón 1"
			onclick="mostrarMensaje(this)">
		Botón 1
		</button>

		<button data-mensaje="Mensaje del botón 2"
			onclick="mostrarMensaje(this)">
		Botón 2
		</button>

		<button data-mensaje="Mensaje del botón 3"
			onclick="mostrarMensaje(this)">
		Botón 3
		</button>

		<p id="mensaje"></p>
    </div>

	<script>
		function mostrarMensaje(boton) {
		document.getElementById("mensaje").textContent = boton.dataset.mensaje;
		}
	</script>

</body>
</html>
