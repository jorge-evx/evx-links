<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Prueba Básica</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #mensaje {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>¡Hola, Mundo!</h1>
        <p>Esta es una página básica para probar que todo funciona correctamente.</p>
        <button onclick="mostrarMensaje()">Haz clic aquí</button>
        <p id="mensaje"></p>
    </div>

	<div class="contenedor">
		<a href="buton_pru.html">Ir a la página de prueba de botones</a>
	</div>

	<script>
        function mostrarMensaje() {
            document.getElementById("mensaje").textContent = "¡El código JavaScript funciona perfectamente!";
        }
    </script>

</body>
</html>
